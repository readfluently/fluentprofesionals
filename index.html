<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FluentProfessionals</title>
  <link rel="stylesheet" href="./src/styles/main.css"/>
</head>

<body>

  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <h1>FluentProfessionals</h1>
      <p class="tagline">Language for professionals</p>
    </header>

    <!-- Language Selection -->
    <section class="language-select">
      <label>Home Language</label>
      <select id="sourceLang">
        <option value="english">English</option>
        <option value="afrikaans">Afrikaans</option>
        <option value="isizulu">isiZulu</option>
        <option value="setswana">Setswana</option>
      </select>

      <label>Target Language</label>
      <select id="targetLang">
        <option value="afrikaans">Afrikaans</option>
        <option value="english">English</option>
        <option value="isizulu">isiZulu</option>
        <option value="setswana">Setswana</option>
      </select>
    </section>

    <!-- Main Tiles -->
    <section class="main-tiles">

      <a href="./src/pages/phrases.html" class="tile">
        <h2>Learn Phrases</h2>
        <p>Everyday and professional language</p>
      </a>

      <a href="./src/pages/professions.html" class="tile">
        <h2>Language by Profession</h2>
        <p>Law, teaching, healthcare and more</p>
      </a>

      <a href="./src/pages/library.html" class="tile">
        <h2>Library</h2>
        <p>Dialogues and real conversations</p>
      </a>

      <a href="./src/pages/practice.html" class="tile">
        <h2>Speak & Practice</h2>
        <p>Listen, repeat and improve</p>
      </a>

    </section>

  </div>

</body>
</html>
